# Pytest Configuration File
# Configures pytest behavior for running tests

[pytest]
# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 7.0

# Test paths (relative to this file)
testpaths = tests

# Logging
log_cli = true
log_cli_level = INFO
log_file = tests/test_results.log
log_file_level = DEBUG

# Coverage options
# Run: pytest --cov=app --cov-report=html
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers for categorizing tests
markers =
    unit: Unit tests (functions, models, utilities)
    integration: Integration tests (endpoint tests)
    auth: Authentication related tests
    admin: Admin endpoint tests
    teacher: Teacher endpoint tests
    student: Student endpoint tests
    slow: Tests that take significant time
    smoke: Quick smoke tests for basic functionality

# Test timeouts (optional - requires pytest-timeout)
# timeout = 300

# Output options
console_output_style = progress

# Ignore certain warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
